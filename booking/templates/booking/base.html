<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{{ page_title }}{% endblock %} :: {{ site_title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }
        .container { max-width: 960px; margin: 20px auto; padding: 20px; background-color: #1e1e1e; border-radius: 8px; }
        nav { background-color: #1e1e1e; padding: 10px 20px; border-bottom: 1px solid #333; }
        nav a { color: #bb86fc; text-decoration: none; margin-right: 20px; font-weight: 500; }
        nav a:hover { color: #ffffff; }
        h1, h2, h3 { color: #bb86fc; }
        a { color: #03dac6; }
        .btn {
            padding: 12px 20px;
            background-color: #bb86fc;
            color: #121212;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background-color: #a16efc; }
        footer { text-align: center; margin-top: 40px; color: #777; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Главная</a>
        <a href="{% url 'booking:booking_view' %}">Бронирование</a>
        <a href="{% url 'about' %}">О нас</a>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>«Продюсерский центр Big "Z"» © {% now "Y" %}</p>
    </footer>
</body>
</html>
