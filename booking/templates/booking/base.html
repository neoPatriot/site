{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BIGZ - Творческое пространство{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Шапка -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">BIG<span>Z</span></div>
                <nav>
                    <ul>
                        <li><a href="{% url 'home' %}#hero">Главная</a></li>
                        <li><a href="{% url 'home' %}#about">О нас</a></li>
                        <li><a href="{% url 'home' %}#events">Мероприятия</a></li>
                        <li><a href="{% url 'home' %}#contact">Контакты</a></li>
                        <li><a href="{% url 'booking:booking_view' %}">Забронировать</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    {% block content %}{% endblock %}

    <!-- Футер -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="logo">BIG<span>Z</span></div>
                <div class="social-links">
                    <a href="#">VK</a>
                    <a href="#">TG</a>
                    <a href="#">IG</a>
                    <a href="#">YT</a>
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2024 BIGZ. Все права защищены.</p>
            </div>
        </div>
    </footer>
</body>
</html>
