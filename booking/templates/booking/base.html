{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{{ page_title|default:"Главная" }}{% endblock %} :: {{ site_title|default:"BigZ" }}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <div class="logo">
            <a href="{% url 'home' %}">
                <img src="{% static 'images/logo5.png' %}" alt="Big Z">
            </a>
        </div>
    </header>

    <nav>
        <a href="{% url 'home' %}">Главная</a>
        <a href="{% url 'booking:booking_view' %}">Бронирование</a>
        <a href="{% url 'about' %}">О нас</a>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>«Продюсерский центр Big "Z"» © {% now "Y" %}</p>
    </footer>
</body>
</html>
