{% extends 'booking/base.html' %}
{% load static %}

{% block title %}Вход или Регистрация{% endblock %}

{% block content %}
<div class="container" style="padding-top: 120px; text-align: center; min-height: 70vh; max-width: 600px;">
    <div class="section-title" style="margin-bottom: 40px;">
        <h2>Вход или Регистрация</h2>
    </div>
    <p style="margin-bottom: 30px; font-size: 1.1rem; color: rgba(255,255,255,0.8);">
        Войдите с помощью Telegram, чтобы получить доступ к истории бронирований и ускорить процесс заказа.
    </p>

    <!--
    ###################################################################
    # ВНИМАНИЕ: Замените 'YOUR_BOT_USERNAME_HERE' на имя вашего бота.  #
    # Также, ваш домен (включая порт для разработки) должен быть       #
    # привязан к боту через команду /setdomain у @BotFather.          #
    ###################################################################
    -->
    <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="YOUR_BOT_USERNAME_HERE"
            data-size="large"
            data-auth-url="{{ request.scheme }}://{{ request.get_host }}{% url 'telegram_login_callback' %}"
            data-request-access="write"></script>
</div>
{% endblock %}
